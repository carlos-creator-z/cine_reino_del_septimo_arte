<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reino del Septimo Arte — Iniciar Sesion</title>
  <link rel="stylesheet" href="css/auth.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap"
    rel="stylesheet"
  >
</head>
<body>

  <!-- Fondo y decoraciones -->
  <div class="bg-overlay"></div>
  <div class="film-strip top"></div>
  <div class="film-strip bottom"></div>
  <div class="particles" id="particles"></div>

  <main class="login-wrapper">

    <!-- Panel decorativo izquierdo -->
    <aside class="deco-panel" aria-hidden="true">
      <div class="deco-content">

        <div class="reel-icon">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#C9A84C" stroke-width="2"/>
            <circle cx="50" cy="50" r="30" fill="none" stroke="#8A6E34" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="8"  fill="#C9A84C"/>
            <circle cx="50" cy="20" r="5"  fill="#8A6E34"/>
            <circle cx="50" cy="80" r="5"  fill="#8A6E34"/>
            <circle cx="20" cy="50" r="5"  fill="#8A6E34"/>
            <circle cx="80" cy="50" r="5"  fill="#8A6E34"/>
          </svg>
        </div>

        <div class="deco-lines">
          <span></span><span></span><span></span>
        </div>

        <p class="deco-quote">
          "El cine es un espejo que refleja<br>el alma del mundo"
        </p>

        <div class="deco-lines">
          <span></span><span></span><span></span>
        </div>

      </div>
    </aside>

    <!-- Tarjeta de login -->
    <section class="login-card">

      <header class="card-header">
        <div class="crown-icon">&#9819;</div>
        <h1 class="brand-title">Reino del<br><em>Septimo Arte</em></h1>
        <p class="brand-sub">Acceso Exclusivo</p>
        <div class="divider">
          <span></span>
          <span class="dot">&#9670;</span>
          <span></span>
        </div>
      </header>

      <form id="loginForm" novalidate>

        <!-- Campo: correo -->
        <div class="field-group">
          <label for="email">Correo Electronico</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@correo.com"
              autocomplete="email"
              required
            >
          </div>
          <span class="field-error" id="emailError" role="alert"></span>
        </div>

        <!-- Campo: contraseña -->
        <div class="field-group">
          <label for="password">Contrasena</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="------"
              autocomplete="current-password"
              required
            >
            <button
              type="button"
              class="toggle-pw"
              id="togglePw"
              aria-label="Mostrar contrasena"
            >
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passError" role="alert"></span>
        </div>

        <!-- Extras: recordarme + olvidé contraseña -->
        <div class="extras-row">
          <label class="remember-label">
            <input type="checkbox" id="remember" name="remember">
            <span class="custom-check"></span>
            Recordarme
          </label>
          <a href="#" class="forgot-link">Olvidaste tu contrasena?</a>
        </div>

        <!-- Botón submit -->
        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Entrar al Reino</span>
          <span class="btn-loader" id="btnLoader" aria-hidden="true"></span>
        </button>

      </form>

      <footer class="card-footer">
        <p>No tienes cuenta? <a href="/register.html" class="register-link">Registrate aqui</a></p>
        <div class="social-row">
          <span class="social-divider">o vuelve a</span>
          <div class="social-btns">
            <a href="/" class="social-btn-link">Cartelera</a>
          </div>
        </div>
      </footer>

    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
